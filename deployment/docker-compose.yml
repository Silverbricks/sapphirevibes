version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sv_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sapphirevibes
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sv_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sv_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sapphirevibes.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      postgres:
        condition: service_healthy

  mailhog:
    image: mailhog/mailhog:latest
    container_name: sv_mailhog
    restart: unless-stopped
    ports:
      - '1025:1025'   # SMTP
      - '8025:8025'   # Web UI

  # ── Local app services (optional — use these for full-stack local dev) ──

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: development
    container_name: sv_backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:password@postgres:5432/sapphirevibes?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
    env_file:
      - ../backend/.env
    ports:
      - '3001:3001'
    volumes:
      - ../backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run start:dev
    profiles: ['app']

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: development
    container_name: sv_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3001/api/v1
      NEXT_PUBLIC_APP_URL: http://localhost:3031
    env_file:
      - ../frontend/.env
    ports:
      - '3031:3031'
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev
    profiles: ['app']

volumes:
  pgdata:
  redisdata:
